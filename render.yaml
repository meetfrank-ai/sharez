services:
  - type: web
    name: sharez
    runtime: python
    buildCommand: bash build.sh
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SHAREZ_SECRET_KEY
        generateValue: true
      - key: SHAREZ_FERNET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: NODE_VERSION
        value: "20"
      - key: GOOGLE_CLIENT_ID
        value: "834694676276-lps1on59n5dbdhqkqbeqq7e63hltquch.apps.googleusercontent.com"
      - key: FRONTEND_URL
        value: "https://sharez.onrender.com"

  - type: cron
    name: sharez-daily-scrape
    runtime: python
    buildCommand: bash build.sh
    schedule: "0 6 * * *"
    startCommand: cd backend && python scraper_job.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: DATABASE_URL
        fromService:
          name: sharez
          type: web
          property: DATABASE_URL
      - key: EODHD_API_KEY
        fromService:
          name: sharez
          type: web
          property: EODHD_API_KEY
